<!DOCTYPE html>
<html>
<head>
    <title>Enter Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>💓 Enter Patient Details</h2>

<form method="POST">

<input type="number" name="age" placeholder="Age" required><br>
<input type="number" name="sex" placeholder="Sex (1=Male, 0=Female)" required><br>
<input type="number" name="cp" placeholder="Chest Pain Type (0-3)" required><br>
<input type="number" name="trestbps" placeholder="Resting BP" required><br>
<input type="number" name="chol" placeholder="Cholesterol" required><br>
<input type="number" name="fbs" placeholder="Fasting Blood Sugar (1/0)" required><br>
<input type="number" name="restecg" placeholder="Rest ECG (0-2)" required><br>
<input type="number" name="thalach" placeholder="Max Heart Rate" required><br>
<input type="number" name="exang" placeholder="Exercise Angina (1/0)" required><br>
<input type="number" step="any" name="oldpeak" placeholder="Oldpeak" required><br>
<input type="number" name="slope" placeholder="Slope (0-2)" required><br>
<input type="number" name="ca" placeholder="CA (0-3)" required><br>
<input type="number" name="thal" placeholder="Thal (1-3)" required><br>

<button type="submit">Predict Risk</button>

</form>
</div>

</body>
</html>
